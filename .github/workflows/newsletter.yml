name: Send Cambridge Film Newsletter

on:
  schedule:
    - cron: '52 9 * * 2'  # Every Tuesday at 9:52am UTC
  workflow_dispatch:
    inputs:
      test:
        description: 'Send only to test address (not subscribers)'
        required: false
        type: boolean
        default: false

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TO_EMAILS: ${{ secrets.TO_EMAILS }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py ${{ github.event.inputs.test == 'true' && '--test' || '' }}

      - name: Commit updated showings data
        if: ${{ github.event.inputs.test != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/showings.json
          git diff --cached --quiet || git commit -m "chore: update showings data [skip ci]"
          git push
